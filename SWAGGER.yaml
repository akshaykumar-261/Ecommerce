openapi: 3.0.0
info:
  title: Ecommerce Platform API
  description: Complete REST API documentation for Ecommerce Backend Platform
  version: 1.0.0
  contact:
    name: Support Team
    email: support@ecommerce.com

servers:
  - url: http://localhost:8085
    description: Development Server
  - url: https://api.ecommerce.com
    description: Production Server

tags:
  - name: Authentication
    description: User authentication and authorization endpoints
  - name: Users
    description: User management endpoints
  - name: Roles
    description: Role management endpoints
  - name: Devices
    description: User device tracking endpoints

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: John
        lastname:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        password:
          type: string
          format: password
          example: HashedPassword123
        address:
          type: string
          example: 123 Main St, New York, NY 10001
        phoneNo:
          type: string
          example: +1234567890
        avatar:
          type: string
          format: uri
          example: https://cloudinary.com/user-avatar.jpg
        otp:
          type: integer
          example: 123456
        otp_expire:
          type: string
          format: date-time
          example: 2026-07-13T15:30:00Z
        is_verified:
          type: boolean
          example: true
        role_Id:
          type: integer
          example: 1
        is_mobile_notification_active:
          type: boolean
          example: true
        social_id:
          type: string
          example: google_id_123456
        otp_type:
          type: string
          enum: [EMAIL_VERIFICATION, FORGOT_PASSWORD]
          example: EMAIL_VERIFICATION
        provider:
          type: string
          enum: [LOCAL, GOOGLE, FACEBOOK, GITHUB]
          example: LOCAL
        createdAt:
          type: string
          format: date-time
          example: 2026-07-13T10:00:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-07-13T12:30:00Z

    Role:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Admin
        createdAt:
          type: string
          format: date-time
          example: 2026-07-13T10:00:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-07-13T10:00:00Z

    UserDevice:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_Id:
          type: integer
          example: 1
        device_id:
          type: string
          example: device_uuid_123
        device_token:
          type: string
          example: fcm_device_token_xyz
        device_type:
          type: integer
          enum: [1, 2, 3]
          example: 1
          description: 1=Android, 2=iOS, 3=Web
        is_login:
          type: boolean
          example: true
        login_time:
          type: string
          format: date-time
          example: 2026-07-13T10:00:00Z
        logout_time:
          type: string
          format: date-time
          example: null
        session_id:
          type: string
          example: session_abc123
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApiResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: Success
        data:
          type: object
          nullable: true

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Invalid request
        errors:
          type: array
          items:
            type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: password123

    RegisterRequest:
      type: object
      required:
        - name
        - lastname
        - email
        - password
      properties:
        name:
          type: string
          example: John
        lastname:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          example: SecurePassword123
        phoneNo:
          type: string
          example: +1234567890
        address:
          type: string
          example: 123 Main St

    OTPRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    VerifyOTPRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        otp:
          type: integer
          example: 123456

paths:
  /api/auth/register:
    post:
      summary: Register a new user
      description: Create a new user account with email and password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login:
    post:
      summary: User login
      description: Authenticate user with email and password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/send-otp:
    post:
      summary: Send OTP to email
      description: Generate and send OTP for email verification or password reset
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OTPRequest"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/verify-otp:
    post:
      summary: Verify OTP
      description: Verify OTP sent to user email
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOTPRequest"
      responses:
        "200":
          description: OTP verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users:
    get:
      summary: Get all users
      description: Retrieve list of all users (Admin only)
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          schema:
            type: integer
            example: 10
      responses:
        "200":
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/{userId}:
    get:
      summary: Get user by ID
      description: Retrieve specific user details
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Update user profile
      description: Update user information
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                lastname:
                  type: string
                phoneNo:
                  type: string
                address:
                  type: string
                is_mobile_notification_active:
                  type: boolean
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete user account
      description: Soft delete user account
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/{userId}/avatar:
    post:
      summary: Upload user avatar
      description: Upload and update user avatar image to Cloudinary
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/roles:
    get:
      summary: Get all roles
      description: Retrieve list of all available roles
      tags:
        - Roles
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Roles retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"

    post:
      summary: Create new role
      description: Create a new user role (Admin only)
      tags:
        - Roles
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: Manager
      responses:
        "201":
          description: Role created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "409":
          description: Role already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/roles/{roleId}:
    get:
      summary: Get role by ID
      description: Retrieve specific role details
      tags:
        - Roles
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Role found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: Role not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Update role
      description: Update role information (Admin only)
      tags:
        - Roles
      security:
        - BearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Role updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

    delete:
      summary: Delete role
      description: Delete a role (Admin only)
      tags:
        - Roles
      security:
        - BearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Role deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/devices:
    get:
      summary: Get user devices
      description: Retrieve list of devices associated with user
      tags:
        - Devices
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Devices retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserDevice"

    post:
      summary: Register device
      description: Register a new device for push notifications
      tags:
        - Devices
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - device_id
                - device_token
                - device_type
              properties:
                device_id:
                  type: string
                  example: device_uuid_123
                device_token:
                  type: string
                  example: fcm_token_xyz
                device_type:
                  type: integer
                  enum: [1, 2, 3]
                  example: 1
      responses:
        "201":
          description: Device registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/devices/{deviceId}:
    get:
      summary: Get device details
      description: Retrieve specific device information
      tags:
        - Devices
      security:
        - BearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Device found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

    put:
      summary: Update device
      description: Update device information or token
      tags:
        - Devices
      security:
        - BearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                device_token:
                  type: string
                is_login:
                  type: boolean
      responses:
        "200":
          description: Device updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

    delete:
      summary: Delete device
      description: Unregister device
      tags:
        - Devices
      security:
        - BearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Device deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/devices/{deviceId}/logout:
    post:
      summary: Logout device
      description: Mark device as logged out
      tags:
        - Devices
      security:
        - BearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Device logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
